// RANDOM SCREEN
let randFilter='mine';
let currentRandIdx=-1,currentRandDayKey=null,lastRandIdx=-1;

function getActivePool(){
  const goal=activeProg?.goal||'balanced';
  if(randFilter==='mine') return RAND_POOLS[goal]||RAND_POOLS.balanced;
  return Object.values(RAND_POOLS).flat();
}

function openRandom(){
  buildRandFilterBar();reroll();
  document.getElementById('randOverlay').classList.add('open');
  document.getElementById('randOverlay').scrollTop=0;
}

function buildRandFilterBar(){
  const goal=activeProg?.goal||'balanced';
  const labels={strength:'Strength',hypertrophy:'Size',fatloss:'Fat Loss',athletic:'Athletic',balanced:'Balanced',endurance:'Endurance'};
  document.getElementById('randFilterBar').innerHTML=[
    {id:'mine',label:'My Goal ('+labels[goal]+')'},
    {id:'all',label:'See All'},
  ].map(f=>`<button class="rand-filter-btn${randFilter===f.id?' active':''}" onclick="setRandFilter('${f.id}')">${f.label}</button>`).join('');
}

function setRandFilter(f){randFilter=f;buildRandFilterBar();reroll();}

function reroll(){
  const pool=getActivePool();
  let idx;
  do{idx=Math.floor(Math.random()*pool.length);}while(idx===lastRandIdx&&pool.length>1);
  lastRandIdx=idx;currentRandIdx=idx;
  const w=pool[idx];
  const done=getWildcardDone();
  const alreadyDone=done.some(d=>d.title===w.title);
  const now=new Date();
  const dowToKey={0:'sun',1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat'};
  currentRandDayKey=dowToKey[now.getDay()]||'mon';
  const goal=activeProg?.goal||'balanced';
  const colors={strength:'var(--lift)',hypertrophy:'var(--hip)',fatloss:'var(--run)',athletic:'var(--bike)',balanced:'var(--accent)',endurance:'var(--run)'};
  const color=colors[goal];
  let html=`<div style="text-align:center;padding:4px 0 16px">
    <div class="rand-badge" style="background:${color}22;color:${color}">${alreadyDone?'Done Before ✓':'Wildcard'}</div>
    <div class="rand-title">${w.title}</div>
  </div>`;
  if(w.cardio){
    const ctype=(w.cardio.type||'').toLowerCase();
    const blockCls=ctype.includes('swim')?'swim-block':ctype.includes('run')?'run-block':ctype.includes('bike')?'bike-block':'cardio-block';
    const labelCls=ctype.includes('swim')?'cardio-label-swim':ctype.includes('run')?'cardio-label-run':ctype.includes('bike')?'cardio-label-bike':'cardio-label-general';
    html+=`<div class="${blockCls}"><div class="cardio-type-label ${labelCls}">${w.cardio.type}</div><div class="cardio-detail">${w.cardio.detail}</div></div>`;
  }
  html+=buildSectionsHTML(w.sections);
  if(w.note) html+=`<div class="note-block">${w.note}</div>`;
  if(alreadyDone) html+=`<div class="wildcard-done-block">✓ You've done this one before</div>`;
  else html+=`<button class="wildcard-complete-btn" onclick="completeWildcard('${(w.title||'').replace(/'/g,"\\'")}')">✅ Complete — Mark Done</button>`;
  document.getElementById('randBody').innerHTML=html;
}

function completeWildcard(title){
  const done=getWildcardDone();
  if(!done.some(d=>d.title===title)) done.push({title,ts:Date.now()});
  saveWildcardDone(done);
  markDayComplete(currentWeek,currentRandDayKey,title);
  updateRandCounter();showToast(title+' logged ✓');closeRandom();
}
function closeRandom(){document.getElementById('randOverlay').classList.remove('open');}

let resetPending=false;
function resetWildcardCounter(){
  if(!resetPending){
    resetPending=true;
    const rb=document.querySelector('.reset-rand-btn');
    if(rb){rb.textContent='Tap again to confirm';rb.style.color='var(--red)';}
    setTimeout(()=>{resetPending=false;updateRandCounter();},3000);return;
  }
  resetPending=false;saveWildcardDone([]);updateRandCounter();showToast('Wildcard counter reset ✓');
}
function updateRandCounter(){
  const done=getWildcardDone();
  const goal=activeProg?.goal||'balanced';
  const pool=RAND_POOLS[goal]||RAND_POOLS.balanced;
  const myDone=done.filter(d=>pool.some(w=>w.title===d.title)).length;
  const el=document.getElementById('randCounter');if(el) el.textContent=myDone+'/'+pool.length;
  if(!resetPending){const rb=document.querySelector('.reset-rand-btn');if(rb){rb.textContent='↺ Reset Wildcard Counter';rb.style.color='';}}
}

// WEEK VIEW
const allDaysList=ALL_DAYS_ORDER;
// dayOffset: days from Monday to reach each day (Mon=0...Sun=6)
// Used to calculate actual calendar date for each training day
const dayOffset={mon:0,tue:1,wed:2,thu:3,fri:4,sat:5,sun:6};
const tagMeta={run:{cls:'t-run',label:'Run'},bike:{cls:'t-bike',label:'Bike'},swim:{cls:'t-swim',label:'Swim'},lift:{cls:'t-lift',label:'Lift'},hip:{cls:'t-hip',label:'Hip'}};

function getWeekMonday(dateStr){
  // Get the Monday of the week containing the given date string
  const parts=dateStr.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setHours(0,0,0,0);
  // getDay(): 0=Sun,1=Mon,...,6=Sat
  // Days since Monday: Sun=6, Mon=0, Tue=1, Wed=2, Thu=3, Fri=4, Sat=5
  const dayOfWeek=d.getDay();
  const daysSinceMonday=dayOfWeek===0?6:dayOfWeek-1;
  d.setDate(d.getDate()-daysSinceMonday);
  return d;
}
function calcCurrentWeek(){
  if(!activeProg?.startDate) return 1;
  // Anchor to the Monday of the start date's week
  const weekMon=getWeekMonday(activeProg.startDate);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.floor((today-weekMon)/86400000);
  if(diff<0) return 1;
  const totalWeeks=activeProg.totalWeeks||6;
  return Math.min(totalWeeks,Math.floor(diff/7)+1);
}

function renderWeekView(){
  if(!activeProg) return;
  const nm=activeProg.name.length>20?activeProg.name.slice(0,20)+'…':activeProg.name;
  document.getElementById('weekViewTitle').innerHTML=`<span style="color:var(--accent)">${nm.toUpperCase()}</span>`;
  const totalWeeks=activeProg.totalWeeks||6;
  // Dynamic phase labels based on program length
  let phases=[];
  if(totalWeeks<=6){
    phases=[{weeks:[1,2],label:'Phase 1 — Rebuild'},{weeks:[3,4],label:'Phase 2 — Load'},{weeks:[5,6],label:'Phase 3 — Peak'}];
  } else if(totalWeeks<=8){
    phases=[{weeks:[1,2],label:'Phase 1 — Base'},{weeks:[3,4,5],label:'Phase 2 — Build'},{weeks:[6,7,8],label:'Phase 3 — Peak'}];
  } else if(totalWeeks<=12){
    phases=[{weeks:[1,2,3],label:'Phase 1 — Base'},{weeks:[4,5,6,7],label:'Phase 2 — Build'},{weeks:[8,9,10],label:'Phase 3 — Peak'},{weeks:[11,12],label:'Phase 4 — Race Prep'}];
  } else if(totalWeeks<=16){
    phases=[{weeks:[1,2,3,4],label:'Phase 1 — Base'},{weeks:[5,6,7,8],label:'Phase 2 — Build'},{weeks:[9,10,11,12],label:'Phase 3 — Peak'},{weeks:[13,14,15,16],label:'Phase 4 — Taper'}];
  } else {
    phases=[{weeks:[1,2,3,4,5],label:'Phase 1 — Foundation'},{weeks:[6,7,8,9,10],label:'Phase 2 — Build'},{weeks:[11,12,13,14,15],label:'Phase 3 — Peak'},{weeks:[16,17,18,19,20],label:'Phase 4 — Taper'}];
  }
  const ph=phases.find(p=>p.weeks.includes(currentWeek));
  document.getElementById('phasePill').textContent=ph?.label||'';
  const wscroll=document.getElementById('weekScroll');wscroll.innerHTML='';
  const actualWeek=calcCurrentWeek();
  for(let w=1;w<=totalWeeks;w++){
    const b=document.createElement('button');b.className='week-btn'+(w===currentWeek?' active':'');
    b.textContent='Week '+w+(w===actualWeek?' ●':'');
    b.onclick=(wk=>()=>{currentWeek=wk;renderWeekView();})(w);wscroll.appendChild(b);
  }
  updateRandCounter();
  const sdi=document.getElementById('startDateInput');if(sdi) sdi.value=activeProg.startDate||'';
  const list=document.getElementById('daysList');list.innerHTML='';
  const wkData=activeProg.weeks[currentWeek];if(!wkData) return;
  const completed=getCompleted();
  const now=new Date();now.setHours(0,0,0,0);
  let startDate=null;
  if(activeProg.startDate){const parts=activeProg.startDate.split('-');startDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));startDate.setHours(0,0,0,0);}
  allDaysList.forEach(d=>{
    const day=wkData[d];if(!day) return;
    const compData=completed[completedKey(currentWeek,d)];
    const isCompleted=!!compData;const displayTitle=compData?.title||day.title;
    let isPast=false,isToday=false;
    if(startDate){
      // Anchor to Monday of the start date's week
      // Then add (week-1)*7 to reach the right week, + dayOffset[d] for the specific day
      const weekMon=getWeekMonday(activeProg.startDate);
      const dayDate=new Date(weekMon);
      dayDate.setDate(weekMon.getDate()+(currentWeek-1)*7+dayOffset[d]);
      dayDate.setHours(0,0,0,0);
      isPast=dayDate<now&&!day.rest;
      isToday=dayDate.getTime()===now.getTime();
    }
    const card=document.createElement('div');
    let cls='day-card'+(day.rest?' rest':'')+(isCompleted?' completed':isPast?' past':'')+(isToday?' today':'');
    card.className=cls;
    const dotCls='dot-'+(day.dot||'rest');
    const compTag=isCompleted?'<span class="tag t-done">✓ Done</span>':'';
    const tagsHtml=(day.tags||[]).filter(t=>t!=='rest').map(t=>`<span class="tag ${tagMeta[t]?.cls||''}">${tagMeta[t]?.label||t}</span>`).join('');
    const todayBadge=isToday?'<span class="today-badge">TODAY</span>':'';
    const rightEl=day.rest&&!isCompleted?'':isCompleted?'<span class="past-check">✓</span>':'<div class="day-arrow">›</div>';
    const dotLabels={mon:'MON',tue:'TUE',wed:'WED',thu:'THU',fri:'FRI',sat:'SAT',sun:'SUN'};
    card.innerHTML=`<div class="day-dot ${dotCls}">${dotLabels[d]||d.toUpperCase()}</div><div class="day-info"><div class="day-name">${DAY_FULL[d]}${todayBadge}</div><div class="day-title">${displayTitle}</div>${tagsHtml||compTag?`<div class="day-tags">${tagsHtml}${compTag}</div>`:''}</div>${rightEl}`;
    if(!day.rest) card.onclick=()=>openDetail(d,day);
    else if(isCompleted){card.style.cursor='pointer';card.onclick=()=>{toggleComplete(currentWeek,d,null);showToast('Removed');};}
    list.appendChild(card);
  });
}

// DETAIL VIEW
function buildSectionsHTML(sections){
  let html='';
  (sections||[]).forEach(sec=>{
    html+=`<div class="section"><div class="section-label">${sec.label}</div>`;
    if(sec.hip){
      html+=`<div style="background:var(--hip-dim);border:1px solid rgba(181,123,238,0.2);border-radius:12px;overflow:hidden"><div style="padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--hip);background:rgba(181,123,238,0.08);border-bottom:1px solid rgba(181,123,238,0.1)">Hip mobility + stability</div>`;
      (sec.items||[]).forEach(i=>{html+=`<div class="exercise-item" style="background:transparent;border-color:rgba(181,123,238,0.1);border-radius:0!important"><span class="ex-name">${i.name}</span><span class="ex-detail">${i.detail||''}</span></div>`;});
      html+=`</div>`;
    } else if(sec.superset){
      html+=`<div class="superset-wrap"><div class="superset-header">Superset — no rest between</div>`;
      (sec.items||[]).forEach(i=>{html+=`<div class="exercise-item"><span class="ex-name">${i.name}</span><span class="ex-detail">${i.detail||''}</span></div>`;});
      html+=`</div>`;
    } else {
      (sec.items||[]).forEach(i=>{html+=`<div class="exercise-item"><span class="ex-name">${i.name}</span><span class="ex-detail">${i.detail||''}</span></div>`;});
    }
    html+=`</div>`;
  });
  return html;
}

function buildCardioHTML(cardio){
  if(!cardio) return '';
  const ctype=(cardio.type||'').toLowerCase();
  const blockCls=ctype==='swim'?'swim-block':ctype==='run'?'run-block':ctype==='bike'?'bike-block':'cardio-block';
  const labelCls=ctype==='swim'?'cardio-label-swim':ctype==='run'?'cardio-label-run':ctype==='bike'?'cardio-label-bike':'cardio-label-general';
  const typeNames={run:'Run',bike:'Bike / Spin',swim:'Swim'};
  const typeName=typeNames[ctype]||cardio.type;
  const subLabel=cardio.subtype?' — '+cardio.subtype.replace(/_/g,' '):'';
  let inner=`<div class="cardio-type-label ${labelCls}">${typeName}${subLabel}</div>`;
  inner+=`<div class="cardio-detail">${(cardio.detail||'').replace(/\n/g,'<br>')}</div>`;
  if(cardio.note) inner+=`<div class="cardio-note">${cardio.note}</div>`;
  return `<div class="${blockCls}">${inner}</div>`;
}

function buildLogHTML(dayKey){
  const logs=getLogs();const key=logKey(currentWeek,dayKey);const e=logs[key]||{};
  const hasData=Object.values(e).some(v=>v);
  const cfg=activeProg?.cfg||{};
  const hasRun=cfg.cardioTypes?.includes('run');
  const hasBike=cfg.cardioTypes?.includes('bike');
  const hasSwim=cfg.cardioTypes?.includes('swim');
  return `<div class="log-section" id="logSection">
    <div class="log-header">📊 Log This Session</div>
    <div class="log-body">
      <div class="log-row">
        <div class="log-field"><label>Energy</label><select id="log_energy"><option value="">—</option>${['💀 Destroyed','😤 Gassed but good','💪 Felt great','🔥 Beast mode'].map(v=>`<option${e.energy===v?' selected':''}>${v}</option>`).join('')}</select></div>
        <div class="log-field"><label>Sleep</label><select id="log_sleep"><option value="">—</option>${['<5 hrs','5–6 hrs','6–7 hrs','7–8 hrs','8+ hrs'].map(v=>`<option${e.sleep===v?' selected':''}>${v}</option>`).join('')}</select></div>
      </div>
      <div class="log-row">
        <div class="log-field"><label>Bench</label><input type="text" id="log_bench" placeholder="245×7" value="${e.bench||''}"></div>
        <div class="log-field"><label>Squat</label><input type="text" id="log_squat" placeholder="185×5" value="${e.squat||''}"></div>
      </div>
      <div class="log-row">
        <div class="log-field"><label>Deadlift</label><input type="text" id="log_dead" placeholder="245×5" value="${e.dead||''}"></div>
        ${hasRun?`<div class="log-field"><label>Run</label><input type="text" id="log_run" placeholder="2.5mi @ 10:30" value="${e.run||''}"></div>`
        :hasBike?`<div class="log-field"><label>Bike</label><input type="text" id="log_bike" placeholder="6 intervals done" value="${e.bike||''}"></div>`
        :hasSwim?`<div class="log-field"><label>Swim</label><input type="text" id="log_swim" placeholder="4×100m done" value="${e.swim||''}"></div>`
        :`<div class="log-field"><label>Cardio</label><input type="text" id="log_cardio" placeholder="notes" value="${e.cardio||''}"></div>`}
      </div>
      <div class="log-field"><label>Body / injury check</label><input type="text" id="log_injury" placeholder="hip tight, shoulder fine, etc." value="${e.injury||''}"></div>
      <div class="log-field"><label>Notes</label><textarea id="log_notes" placeholder="How'd it go?">${e.notes||''}</textarea></div>
      <button class="save-log-btn" onclick="saveLog('${dayKey}')">Save Session Log</button>
      ${hasData?`<button class="clear-log-btn" onclick="clearLog('${dayKey}')">✕ Clear This Log</button>`:''}
    </div>
  </div>`;
}

function buildExportHTML(){
  const logs=getLogs();const keys=Object.keys(logs);if(!keys.length) return '';
  const summary=keys.map(k=>{const l=logs[k];const p=[`[${k}]`];
    if(l.energy)p.push('Energy:'+l.energy);if(l.sleep)p.push('Sleep:'+l.sleep);
    if(l.bench)p.push('Bench:'+l.bench);if(l.squat)p.push('Squat:'+l.squat);
    if(l.dead)p.push('DL:'+l.dead);if(l.run)p.push('Run:'+l.run);
    if(l.bike)p.push('Bike:'+l.bike);if(l.swim)p.push('Swim:'+l.swim);
    if(l.cardio)p.push('Cardio:'+l.cardio);if(l.injury)p.push('Body:'+l.injury);
    if(l.notes)p.push('Notes:'+l.notes);return p.join(' | ');
  }).join('\n');
  return `<div class="export-section"><div class="export-label">📋 Copy to Claude for feedback</div><div class="export-text" id="exportText">${summary}</div><button class="export-btn" onclick="copyExport()">Copy to Clipboard</button></div>`;
}

function openDetail(dayKey,day){
  currentDayKey=dayKey;
  const compData=getCompleted()[completedKey(currentWeek,dayKey)];
  document.getElementById('detailDayName').textContent=DAY_FULL[dayKey];
  document.getElementById('detailDayTitle').textContent=compData?.title||day.title;
  let html=buildCardioHTML(day.cardio)+buildSectionsHTML(day.sections);
  if(day.note) html+=`<div class="note-block">${day.note}</div>`;
  html+=buildLogHTML(dayKey)+buildExportHTML();
  const isComp=!!compData;
  html+=`<button class="complete-btn${isComp?' done':''}" id="compBtn" onclick="handleCompleteDay('${dayKey}','${(day.title||'').replace(/'/g,"\\'")}'">${isComp?'✓ Marked Complete — Tap to Undo':'✅ Mark Day Complete'}</button>`;
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailOverlay').scrollTop=0;
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');renderWeekView();}
function handleCompleteDay(dayKey,title){
  toggleComplete(currentWeek,dayKey,title);
  const compData=getCompleted()[completedKey(currentWeek,dayKey)];
  const btn=document.getElementById('compBtn');
  if(btn){btn.textContent=compData?'✓ Marked Complete — Tap to Undo':'✅ Mark Day Complete';btn.classList.toggle('done',!!compData);}
  showToast(compData?'Day complete ✓':'Unmarked');
}
function toggleComplete(wk,dayKey,title){
  const c=getCompleted();const k=completedKey(wk,dayKey);
  if(c[k])delete c[k];else c[k]={title,ts:Date.now()};saveCompleted(c);renderWeekView();
}
function markDayComplete(wk,dayKey,title){
  const c=getCompleted();c[completedKey(wk,dayKey)]={title,ts:Date.now()};saveCompleted(c);renderWeekView();
}
function saveLog(dayKey){
  const logs=getLogs();const key=logKey(currentWeek,dayKey);
  logs[key]={energy:document.getElementById('log_energy')?.value||'',sleep:document.getElementById('log_sleep')?.value||'',bench:document.getElementById('log_bench')?.value||'',squat:document.getElementById('log_squat')?.value||'',dead:document.getElementById('log_dead')?.value||'',run:document.getElementById('log_run')?.value||'',bike:document.getElementById('log_bike')?.value||'',swim:document.getElementById('log_swim')?.value||'',cardio:document.getElementById('log_cardio')?.value||'',injury:document.getElementById('log_injury')?.value||'',notes:document.getElementById('log_notes')?.value||''};
  saveLogs(logs);
  const c=getCompleted();if(!c[completedKey(currentWeek,dayKey)]){c[completedKey(currentWeek,dayKey)]={title:null,ts:Date.now()};saveCompleted(c);}
  showToast('Session logged + marked complete ✓');renderWeekView();
  const btn=document.getElementById('compBtn');if(btn){btn.textContent='✓ Marked Complete — Tap to Undo';btn.classList.add('done');}
}
function clearLog(dayKey){
  const logs=getLogs();delete logs[logKey(currentWeek,dayKey)];saveLogs(logs);
  showToast('Log cleared');const ls=document.getElementById('logSection');if(ls)ls.outerHTML=buildLogHTML(dayKey);renderWeekView();
}
function copyExport(){
  const txt=document.getElementById('exportText')?.innerText||'';
  navigator.clipboard.writeText(txt).then(()=>showToast('Copied ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied ✓');});
}
function setProgStart(dateStr){
  if(!dateStr||!activeProg) return;
  activeProg.startDate=dateStr;
  const programs=getPrograms();const idx=programs.findIndex(p=>p.id===activeProgId);
  if(idx>=0){programs[idx]=activeProg;savePrograms(programs);}
  currentWeek=calcCurrentWeek();showToast('Start date set ✓');renderWeekView();
}

// PROGRAM LIST
function renderProgList(){
  const programs=getPrograms();const list=document.getElementById('progList');
  if(!programs.length){list.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;">No programs yet.<br>Tap below to build your first.</div>';return;}
  const goalLabels={strength:'Strength',hypertrophy:'Size',fatloss:'Fat Loss',athletic:'Athletic',balanced:'Balanced'};
  list.innerHTML=programs.map(p=>{
    const isActive=p.id===getActiveProgId();
    const cardioSummary=p.cfg?.cardioTypes?.length?p.cfg.cardioTypes.map(t=>({run:'🏃',bike:'🚴',swim:'🏊'})[t]||t).join(' '):'Lift only';
    const goals=p.cfg?.cardioTypes?.map(t=>p.cfg?.cardioGoals?.[t]?.label).filter(Boolean).join(' · ')||'';
    const trainDays=(p.cfg?.days||[]).filter(d=>!(p.cfg?.restDays||[]).includes(d));
    return `<div class="prog-card${isActive?' active-prog':''}">
      <div class="prog-card-header"><div class="prog-card-name">${p.name}</div><div class="prog-card-badge badge-${p.goal}">${goalLabels[p.goal]||p.goal}</div></div>
      <div class="prog-card-meta">${trainDays.map(d=>({sun:'Su',mon:'Mo',tue:'Tu',wed:'We',thu:'Th',fri:'Fr',sat:'Sa'})[d]||d).join(' · ')} · ${p.totalWeeks||6} wks<br>${({home_full:'🏠 Full',home_basic:'🏠 Basic',commercial:'🏋️ Gym',minimal:'🎒 Minimal'})[p.cfg?.equipment]||'🏠'} · ${p.cfg?.experience||'intermediate'} · ${p.cfg?.ageBracket||'18-35'}<br>${cardioSummary}${goals?' · '+goals:''}</div>
      <div class="prog-card-actions">
        <button class="prog-action-btn primary" onclick="openProg('${p.id}')">Open</button>
        ${!isActive?`<button class="prog-action-btn" onclick="setActive('${p.id}')">Set Active</button>`:'<button class="prog-action-btn" style="opacity:0.4;cursor:default">Active ✓</button>'}
        <button class="prog-action-btn danger" onclick="deleteProg('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}
function openProg(id){const programs=getPrograms();activeProg=programs.find(p=>p.id===id);if(!activeProg)return;activeProgId=id;currentWeek=calcCurrentWeek();showScreen('screenWeek');renderWeekView();}
function setActive(id){setActiveProgId(id);renderProgList();showToast('Active program updated');}
function deleteProg(id){let programs=getPrograms();programs=programs.filter(p=>p.id!==id);savePrograms(programs);if(getActiveProgId()===id&&programs.length>0)setActiveProgId(programs[0].id);renderProgList();showToast('Program deleted');}

// INIT
function init(){
  renderProgList();
  const aid=getActiveProgId();const programs=getPrograms();
  if(aid&&programs.length){const prog=programs.find(p=>p.id===aid)||programs[0];if(prog){activeProg=prog;activeProgId=prog.id;currentWeek=calcCurrentWeek();showScreen('screenWeek');renderWeekView();return;}}
  showScreen('screenHome');
}
init();
</script>
